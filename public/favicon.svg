<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="fgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#fbg)"/>
  
  <!-- Border -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="url(#fgold)" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Letter T -->
  <g fill="white">
    <rect x="6" y="8" width="10" height="2.5" rx="0.5"/>
    <rect x="9" y="8" width="2.5" height="16" rx="0.5"/>
  </g>
  
  <!-- Letter K -->
  <g fill="white">
    <rect x="17" y="8" width="2.5" height="16" rx="0.5"/>
    <rect x="19.5" y="8" width="2.5" height="8" rx="0.5" transform="rotate(30 19.5 12)"/>
    <rect x="19.5" y="16" width="2.5" height="8" rx="0.5" transform="rotate(-30 19.5 20)"/>
  </g>
  
  <!-- Corner dots -->
  <circle cx="5" cy="5" r="1" fill="url(#fgold)" opacity="0.6"/>
  <circle cx="27" cy="5" r="1" fill="url(#fgold)" opacity="0.6"/>
</svg>
