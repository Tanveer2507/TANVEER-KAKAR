<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  
  <!-- Border -->
  <rect x="5" y="5" width="190" height="190" rx="35" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  
  <!-- Letter T -->
  <g fill="white" filter="url(#glow)">
    <rect x="40" y="50" width="60" height="15" rx="3"/>
    <rect x="62" y="50" width="16" height="100" rx="3"/>
  </g>
  
  <!-- Letter K -->
  <g fill="white" filter="url(#glow)">
    <rect x="110" y="50" width="16" height="100" rx="3"/>
    <rect x="126" y="50" width="16" height="50" rx="3" transform="rotate(30 126 75)"/>
    <rect x="126" y="100" width="16" height="50" rx="3" transform="rotate(-30 126 125)"/>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="5" fill="url(#gold)" opacity="0.6"/>
  <circle cx="170" cy="30" r="5" fill="url(#gold)" opacity="0.6"/>
  <circle cx="30" cy="170" r="5" fill="url(#gold)" opacity="0.6"/>
  <circle cx="170" cy="170" r="5" fill="url(#gold)" opacity="0.6"/>
  
  <!-- Code brackets -->
  <path d="M 20 90 L 15 100 L 20 110" stroke="url(#gold)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 180 90 L 185 100 L 180 110" stroke="url(#gold)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
